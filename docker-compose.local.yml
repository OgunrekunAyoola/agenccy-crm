# Local verification stack — does NOT affect production.
# Netlify frontend and VPS backend are untouched.
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#
# Then open http://localhost:3000
# Log in with seeded credentials: admin@tenanta.com / Admin123!
#
# How networking works:
#   Browser → localhost:3000/api/* → Next.js rewrite (server-side) → backend:8000/api/*
#   The browser never talks directly to the backend container.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "0"   # root — needed locally so SQLite can write crm_local.db to /app
    ports:
      - "8000:8000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # No DATABASE_URL → backend auto-selects SQLite (zero-config local DB)
      # JWT key and CORS origins come from appsettings.json

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Points Next.js server-side rewrites at the backend container.
        # "backend" resolves via Docker's internal DNS — not exposed to the browser.
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
